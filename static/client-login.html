<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA — Client Login</title>
<style>
  :root{ --bg:#0d0d0f; --panel:#151518; --line:#26262b; --text:#e8e6e3;
         --muted:#8a8791; --orange:#f97316; --orange2:#fb923c; --red:#ef4444; --green:#22c55e; }
  *{ box-sizing:border-box; margin:0; }
  body{ min-height:100vh; display:flex; align-items:center; justify-content:center;
        background:radial-gradient(900px 500px at 70% -10%, #1c1410, var(--bg));
        color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; padding:20px; }
  .card{ width:100%; max-width:400px; background:var(--panel); border:1px solid var(--line);
         border-radius:18px; padding:34px 30px; box-shadow:0 24px 60px rgba(0,0,0,.5); }
  .brand{ text-align:center; margin-bottom:26px; }
  .brand .logo{ width:52px; height:52px; margin:0 auto 12px; border-radius:14px;
     background:linear-gradient(135deg,var(--orange),var(--orange2));
     display:flex; align-items:center; justify-content:center; font-size:24px;
     box-shadow:0 0 34px rgba(249,115,22,.35); }
  .brand h1{ font-size:19px; letter-spacing:1px; }
  .brand h1 span{ color:var(--orange); }
  .brand p{ color:var(--muted); font-size:12.5px; margin-top:4px; }
  label{ display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; }
  input{ width:100%; background:#0e0e11; color:var(--text); border:1px solid var(--line);
         border-radius:10px; padding:12px 14px; font-size:14px; outline:none; transition:.15s; }
  input:focus{ border-color:var(--orange); box-shadow:0 0 0 3px rgba(249,115,22,.15); }
  .pw-wrap{ position:relative; }
  .pw-wrap input{ padding-right:44px; }
  .pw-eye{ position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none;
    border:none; cursor:pointer; font-size:16px; padding:6px; color:var(--muted); line-height:1; }
  .pw-eye:hover{ color:var(--orange); }
  .btn{ width:100%; margin-top:22px; padding:13px; border:none; border-radius:10px;
        background:linear-gradient(135deg,var(--orange),var(--orange2)); color:#111;
        font-weight:700; font-size:15px; cursor:pointer; transition:.15s; }
  .btn:hover{ filter:brightness(1.1); } .btn:disabled{ opacity:.5; cursor:not-allowed; }
  .links{ display:flex; justify-content:space-between; margin-top:16px; font-size:13px; }
  .links a{ color:var(--orange); text-decoration:none; } .links a:hover{ text-decoration:underline; }
  .alert{ margin-top:14px; padding:10px 13px; border-radius:9px; font-size:13px; display:none; }
  .alert.err{ display:block; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#fca5a5; }
  .alert.ok{ display:block; background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3); color:#86efac; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="logo">⚡</div>
    <h1>NEXORA <span>AI TRADER</span></h1>
    <p>Client Portal — sign in to your account</p>
  </div>
  <form id="f">
    <label>Email</label>
    <input id="email" type="email" autocomplete="email" required>
    <label>Password</label>
    <div class="pw-wrap">
      <input id="password" type="password" autocomplete="current-password" required>
      <button type="button" class="pw-eye" onclick="togglePw('password',this)" aria-label="Show password">👁</button>
    </div>
    <div class="alert" id="alert"></div>
    <button class="btn" id="btn" type="submit">Sign In</button>
    <div class="links">
      <a href="/reset">Forgot password?</a>
      <a href="/signup">Create an account</a>
    </div>
  </form>
</div>
<script>
function togglePw(id,btn){ const i=document.getElementById(id);
  if(i.type==="password"){ i.type="text"; btn.textContent="🙈"; }
  else{ i.type="password"; btn.textContent="👁"; } }
document.getElementById("f").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const a=document.getElementById("alert"), b=document.getElementById("btn");
  a.className="alert"; b.disabled=true; b.textContent="Signing in...";
  try{
    const r=await fetch("/client/login",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:document.getElementById("email").value.trim(),
                           password:document.getElementById("password").value})});
    const d=await r.json();
    if(r.ok){ localStorage.setItem("client_token",d.access_token); location.href="/portal"; }
    else{ a.textContent=d.detail||"Invalid email or password"; a.className="alert err"; }
  }catch(_){ a.textContent="Connection error — please try again."; a.className="alert err"; }
  b.disabled=false; b.textContent="Sign In";
});
</script>
</body>
</html>
