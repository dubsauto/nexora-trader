<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA AI TRADER — Admin Sign In</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/assets/ui.css">

    <style>
        /* Small overrides to make auth page look better with your ui.css */
        .ui-auth-card {
            max-width: 380px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="ui-body ui-auth-page">

<div class="ui-auth-shell">
    <div class="ui-panel ui-auth-card">
        <div style="text-align:center;margin-bottom:14px;">
            <div style="font-size:22px;font-weight:800;letter-spacing:.5px;color:var(--cyan);">NEXORA AI TRADER</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;">Admin Dashboard</div>
        </div>
        <div class="ui-panel-title">Sign In</div>

        <div id="alertContainer"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="identifier" class="form-label">Username or Email</label>
                <input type="text" id="identifier" class="form-control" autocomplete="username" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="ui-password-wrap">
                    <input type="password" id="password" class="form-control" autocomplete="current-password" required>
                    <button type="button" class="ui-password-toggle-btn" id="togglePassword" aria-label="Show password">
                        <svg id="eyeOpen" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5 16.477 5 20.268 7.943 21.542 12 20.268 16.057 16.477 19 12 19 7.523 19 3.732 16.057 2.458 12z" />
                        </svg>
                        <svg id="eyeClosed" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908l3.42 3.42M3 3l18 18" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="remember_me">
                <label class="form-check-label" for="remember_me">Remember me on this device</label>
            </div>

            <button type="submit" class="ui-auth-submit">Sign In</button>
        </form>
    </div>
</div>

<script>
    // Password toggle
    const toggleBtn = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    const eyeOpen = document.getElementById("eyeOpen");
    const eyeClosed = document.getElementById("eyeClosed");

    toggleBtn.addEventListener("click", () => {
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            eyeOpen.style.display = "none";
            eyeClosed.style.display = "inline";
        } else {
            passwordInput.type = "password";
            eyeOpen.style.display = "inline";
            eyeClosed.style.display = "none";
        }
    });

    // Login form
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const identifier = document.getElementById("identifier").value.trim();
        const password = document.getElementById("password").value;
        const alertContainer = document.getElementById("alertContainer");

        alertContainer.innerHTML = "";

        try {
            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ identifier, password })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem("token", data.access_token);

                if (document.getElementById("remember_me").checked) {
                    localStorage.setItem("wd_login_identifier_ls_v1", identifier);
                } else {
                    localStorage.removeItem("wd_login_identifier_ls_v1");
                }

                window.location.href = "/admin/app";
            } else {
                alertContainer.innerHTML = `
                    <div class="alert alert-danger ui-auth-alert" role="alert">
                        ${data.detail || "Invalid username or password"}
                    </div>
                `;
            }
        } catch (err) {
            alertContainer.innerHTML = `
                <div class="alert alert-danger ui-auth-alert" role="alert">
                    Connection error. Please try again.
                </div>
            `;
        }
    });

    // Load remembered identifier
    const saved = localStorage.getItem("wd_login_identifier_ls_v1");
    if (saved) document.getElementById("identifier").value = saved;
</script>

</body>
</html>
